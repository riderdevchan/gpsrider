<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตั้งโปรแกรม</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    
    <style>
        /* ตั้งค่าพื้นฐาน */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ---------------------------------- */
        /* ส่วนที่ 1: กล่องติดตั้ง PWA (ด้านบน) */
        /* ---------------------------------- */
        .install-container {
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            text-align: center;
            margin-bottom: 20px;
            display: none; /* จะแสดงอัตโนมัติเมื่อระบบพร้อมติดตั้ง */
        }
        
        .app-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 12px;
            object-fit: contain;
            border-radius: 12px;
        }
        
        .install-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #fff;
        }
        
        .install-btn {
            background-color: #2f80ed;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: background-color 0.2s;
            width: 100%;
        }
        
        .install-btn:hover {
            background-color: #1b66ca;
        }

        /* ---------------------------------- */
        /* ส่วนที่ 2: โครงสร้างเนื้อหาหลัก (เรือนไมล์เดิมของคุณ) */
        /* ---------------------------------- */
        .main-app-content {
            background: #1e1e1e;
            padding: 20px;
            border-radius: 16px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 5px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            background: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        /* เรือนไมล์และตัวเลข */
        .needle-gauge {
            width: 150px;
            height: 150px;
            border: 8px solid #333;
            border-radius: 50%;
            position: relative;
            margin: 20px auto;
            background: #111;
        }

        .needle {
            width: 4px;
            height: 65px;
            background: red;
            position: absolute;
            bottom: 50%;
            left: calc(50% - 2px);
            transform-origin: bottom center;
            transform: rotate(0deg);
            transition: transform 0.2s ease-out;
        }

        .distance-display {
            font-size: 1.5rem;
            font-weight: bold;
            text-align: center;
            margin: 10px 0;
            color: #00ff66;
        }

        .status-text {
            text-align: center;
            font-size: 0.9rem;
            color: #ffcc00;
            margin-bottom: 15px;
        }

        /* ปุ่มระบบงาน */
        .btn {
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin: 8px 0;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-start {
            background-color: #27ae60;
            color: white;
        }

        .btn-danger {
            background-color: #7f8c8d;
            color: white;
        }
    </style>
</head>
<body>

    <div class="install-container" id="pwaBox">
        <img src="icon.png" alt="App Icon" class="app-icon">
        <div class="install-title">ติดตั้งโปรแกรมระบบเรือนไมล์</div>
        <button class="install-btn" id="installBtn">ติดตั้งแอปลงมือถือ</button>
    </div>

    <div class="main-app-content">
        
        <div class="form-group">
            <label>เลือกธีมสบายตา</label>
            <select>
                <option>Cozy Dark (มืดสบายตา)</option>
                <option>Light Mode (สว่าง)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>รูปแบบเรือนไมล์</label>
            <select>
                <option>แบบดิจิตอล (ตัวเลข)</option>
                <option>แบบเข็ม</option>
            </select>
        </div>

        <div class="needle-gauge">
            <div class="needle" id="gaugeNeedle"></div>
        </div>

        <div class="distance-display">0.00 กม.</div>
        <div class="distance-display" style="font-size: 1.1rem; color: #aaa;">0.00 กม./ชม.</div>
        
        <div class="status-text">สถานะการทำงาน: หยุดงาน</div>
        
        <button class="btn btn-start">เริ่มงาน</button>
        
        <div style="margin-top: 20px; border-top: 1px solid #333; padding-top: 15px;">
            <h3 style="font-size: 1.1rem; margin-bottom: 10px;">ประวัติการบันทึก</h3>
            <button class="btn btn-danger">ลบประวัติทั้งหมด</button>
        </div>
        
    </div>

<script>
    // --- ระบบ PWA Service Worker ---
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
            .then(() => console.log('Service Worker Registered'))
            .catch(err => console.log('Service Worker Error:', err));
    }

    // --- ระบบปุ่มกดติดตั้ง PWA ---
    let deferredPrompt;
    const pwaBox = document.getElementById('pwaBox');
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        // แสดงกล่องติดตั้งเมื่อระบบพร้อม
        pwaBox.style.display = 'block';
    });

    installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            console.log(`User response: ${outcome}`);
            deferredPrompt = null;
            pwaBox.style.display = 'none';
        }
    });

    window.addEventListener('appinstalled', () => {
        console.log('PWA Installed');
        pwaBox.style.display = 'none';
    });
</script>

</body>
</html>
